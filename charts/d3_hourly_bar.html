<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>D3 Hourly Passengers</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial; }
    .bar { fill: steelblue; }
    .bar:hover { fill: orange; }
  </style>
</head>
<body>
  <svg width="900" height="500"></svg>

  <script>
    const svg = d3.select("svg");
    const margin = {top: 50, right: 20, bottom: 50, left: 80};
    const width = 900 - margin.left - margin.right;
    const height = 500 - margin.top - margin.bottom;

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    d3.json("hourly_data.json").then(data => {

      data.forEach(d => {
        d.hour = +d.hour;
        d.total_passengers = +d.total_passengers;
      });

      const x = d3.scaleBand()
        .domain(data.map(d => d.hour))
        .range([0, width])
        .padding(0.2);

      const y = d3.scaleLinear()
        .domain([0, d3.max(data, d => d.total_passengers)])
        .nice()
        .range([height, 0]);

      g.append("g")
        .attr("transform", `translate(0,${height})`)
        .call(d3.axisBottom(x));

      g.append("g")
        .call(d3.axisLeft(y));

      g.selectAll(".bar")
        .data(data)
        .enter()
        .append("rect")
        .attr("class", "bar")
        .attr("x", d => x(d.hour))
        .attr("y", d => y(d.total_passengers))
        .attr("width", x.bandwidth())
        .attr("height", d => height - y(d.total_passengers));

      g.append("text")
        .attr("x", width / 2)
        .attr("y", -10)
        .attr("text-anchor", "middle")
        .style("font-size", "20px")
        .text("Passenger Distribution by Hour");

    });
  </script>
</body>
</html>
